name: Run Telegram Music Bot

on:
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v3

      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: ⚙️ Install FFmpeg
        run: |
          sudo apt update
          sudo apt install ffmpeg -y

      - name: 📦 Install Dependencies (No Cache)
        run: |
          python -m pip install --upgrade pip
          pip uninstall pytgcalls -y || true
          pip install --no-cache-dir -r requirements.txt
          pip install --no-cache-dir git+https://github.com/pytgcalls/pytgcalls.git@dev

      - name: 🚀 Run Bot
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          STRING_SESSION: ${{ secrets.STRING_SESSION }}
          SUDO_USERS: ${{ secrets.SUDO_USERS }}
        run: |
          echo "Starting Peaky Music Bot..."
          python3 main.py
